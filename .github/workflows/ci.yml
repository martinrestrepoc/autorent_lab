name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 3000
      MONGO_URI: mongodb://127.0.0.1:27017/autorent_test_ci
      JWT_SECRET: test-secret
      JWT_EXPIRES_IN: 1d
      ADMIN_EMAIL: admin@autorent.local
      ADMIN_PASSWORD: Admin123

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for Mongo
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 27017 && exit 0
            sleep 1
          done
          echo "Mongo did not become ready in time"
          exit 1

      - name: Lint backend
        run: npm run lint:check

      - name: Build backend
        run: npm run build

      - name: Run backend unit tests
        run: npm run test:unit

      - name: Run backend integration tests
        run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
